services:
  bloca-admin-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8080:8080

  bloca-admin-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
